services:

  postgres:
    image: postgres:17

    container_name: relationsync-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Bismillah
      POSTGRES_DB: relationsync

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend

    container_name: relationsync-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "5001:5001"

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend

    container_name: relationsync-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: